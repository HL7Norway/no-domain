name: Choose master for publishing

on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Directory name to publish. Leave blank to list available versions and abort.
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: 📋 Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: 📂 List available versions
        run: |
          echo "Available versions under VitalSigns:"
          ls -1 gh-pages/VitalSigns/

      - name: ✅ Validate input
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "No version selected. See available versions above."
            exit 1
          fi
          if [ ! -d "gh-pages/VitalSigns/$VERSION" ]; then
            echo "Version '$VERSION' not found under VitalSigns/."
            exit 1
          fi

      - name: 📦 Stage selected version for publishing
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p publish-staging/publish
          cp -r "gh-pages/VitalSigns/$VERSION/." publish-staging/publish/
          printf '# Publish log\n\n| Field | Value |\n|-------|-------|\n| Source | `VitalSigns/%s` (branch: `gh-pages`) |\n| Target | `publish/` (branch: `publish-master`) |\n| Time | %s |\n| Triggered by | %s |\n' \
            "$VERSION" "$TIMESTAMP" "${{ github.actor }}" > publish-staging/README.md

      - name: 🚀 Deploy to publish-master
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish-staging
          publish_branch: publish-master
          commit_message: "Publish VitalSigns/${{ github.event.inputs.version }} to publish-master"
